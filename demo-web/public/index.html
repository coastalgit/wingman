<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wingman - AI Coding Tool Manager</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

  <!-- ─── Header ──────────────────────────────────────────── -->
  <header class="app-header">
    <div class="header-left">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="logo-text">Wingman</span>
        <span class="logo-badge">web demo</span>
      </div>
    </div>

    <!-- Tool selector tabs -->
    <nav class="tool-tabs" role="tablist">
      <button class="tool-tab active" data-tool="claude-code" role="tab">
        <span class="tool-indicator" style="background: #d4a574"></span>
        Claude Code
      </button>
      <button class="tool-tab" data-tool="cursor" role="tab">
        <span class="tool-indicator" style="background: #7cacf8"></span>
        Cursor CLI
      </button>
      <button class="tool-tab" data-tool="gemini-cli" role="tab">
        <span class="tool-indicator" style="background: #8bc78b"></span>
        Gemini CLI
      </button>
    </nav>

    <div class="header-right">
      <button class="header-btn" id="settingsBtn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ─── Main Layout ─────────────────────────────────────── -->
  <div class="app-body">

    <!-- Sidebar: Sessions -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Sessions</h2>
        <button class="icon-btn" id="newSessionBtn" title="New session">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
      <div class="session-list" id="sessionList">
        <!-- Populated by JS -->
      </div>
      <div class="sidebar-footer">
        <div class="sidebar-stat">
          <span class="stat-label">Total prompts</span>
          <span class="stat-value" id="totalPrompts">--</span>
        </div>
      </div>
    </aside>

    <!-- Main content area -->
    <main class="main-content">

      <!-- Feature tabs: Context / Prompts -->
      <div class="feature-tabs">
        <button class="feature-tab active" data-feature="context">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          Context
        </button>
        <button class="feature-tab" data-feature="prompts">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="17" y1="10" x2="3" y2="10"/>
            <line x1="21" y1="6" x2="3" y2="6"/>
            <line x1="21" y1="14" x2="3" y2="14"/>
            <line x1="17" y1="18" x2="3" y2="18"/>
          </svg>
          Prompts
        </button>
        <div class="feature-tab-spacer"></div>
        <div class="session-info" id="sessionInfo">
          <span class="session-info-name" id="activeSessionName">Auth refactor</span>
          <span class="session-info-sep">/</span>
          <span class="session-info-tool" id="activeSessionTool">claude-code</span>
        </div>
      </div>

      <!-- ─── Context Panel ─────────────────────────── -->
      <div class="panel context-panel active" id="contextPanel">
        <div class="panel-split">
          <div class="panel-pane editor-pane">
            <div class="pane-header">
              <span class="pane-title">Context Editor</span>
              <div class="pane-actions">
                <button class="small-btn" id="insertTemplateBtn">Insert template</button>
                <span class="char-count" id="contextCharCount">0 chars</span>
              </div>
            </div>
            <textarea
              class="code-textarea"
              id="contextEditor"
              spellcheck="false"
              placeholder="Write your project context in Markdown..."></textarea>
          </div>
          <div class="panel-divider"></div>
          <div class="panel-pane preview-pane">
            <div class="pane-header">
              <span class="pane-title">Preview</span>
              <div class="pane-actions">
                <span class="preview-badge">Markdown</span>
              </div>
            </div>
            <div class="markdown-preview" id="contextPreview">
              <p class="preview-placeholder">Start typing to see a live preview...</p>
            </div>
          </div>
        </div>
      </div>

      <!-- ─── Prompts Panel ─────────────────────────── -->
      <div class="panel prompts-panel" id="promptsPanel">
        <div class="panel-split">
          <div class="panel-pane editor-pane">
            <div class="pane-header">
              <span class="pane-title">Compose Prompt</span>
              <div class="pane-actions">
                <span class="token-estimate" id="tokenEstimate">~0 tokens</span>
              </div>
            </div>
            <textarea
              class="code-textarea"
              id="promptEditor"
              spellcheck="false"
              placeholder="Write your prompt here..."></textarea>
            <div class="prompt-actions">
              <div class="prompt-actions-left">
                <button class="small-btn" id="attachContextBtn">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
                  </svg>
                  Attach context
                </button>
                <button class="small-btn" id="loadTemplateBtn">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <line x1="3" y1="9" x2="21" y2="9"/>
                    <line x1="9" y1="21" x2="9" y2="9"/>
                  </svg>
                  Templates
                </button>
              </div>
              <div class="prompt-actions-right">
                <select class="tool-select" id="sendToTool">
                  <option value="claude-code">Claude Code</option>
                  <option value="cursor">Cursor CLI</option>
                  <option value="gemini-cli">Gemini CLI</option>
                </select>
                <button class="primary-btn" id="sendPromptBtn">
                  Send
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>
          <div class="panel-divider"></div>
          <div class="panel-pane history-pane">
            <div class="pane-header">
              <span class="pane-title">Prompt History</span>
              <div class="pane-actions">
                <input type="text" class="search-input" id="historySearch" placeholder="Search history...">
              </div>
            </div>
            <div class="history-list" id="historyList">
              <!-- Populated by JS -->
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- ─── Status Bar ──────────────────────────────────────── -->
  <footer class="status-bar">
    <div class="status-left">
      <span class="status-item status-project">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
        </svg>
        <span id="statusProject">~/projects/saas-app</span>
      </span>
      <span class="status-sep">|</span>
      <span class="status-item status-branch">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="6" y1="3" x2="6" y2="15"/>
          <circle cx="18" cy="6" r="3"/>
          <circle cx="6" cy="18" r="3"/>
          <path d="M18 9a9 9 0 01-9 9"/>
        </svg>
        <span id="statusBranch">feature/auth-refactor</span>
      </span>
    </div>
    <div class="status-center">
      <span class="status-item" id="statusMessage">Ready</span>
    </div>
    <div class="status-right">
      <span class="status-item">
        <span class="status-dot active"></span>
        <span id="statusTool">Claude Code</span>
      </span>
      <span class="status-sep">|</span>
      <span class="status-item" id="statusTime">--:--</span>
    </div>
  </footer>

  <!-- Toast notification container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="/app.js"></script>
</body>
</html>
