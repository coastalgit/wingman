<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wingman</title>
  <!-- Prevent white flash before CSS loads -->
  <style>html,body{background:#1a2035;}</style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/css/xterm.css" />
  <link rel="stylesheet" href="/session.css" />
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <div class="header-brand">
      <div class="brand-mark">W</div>
      <span class="brand-name">Wingman</span>
      <span class="header-session-name" id="headerSessionName">connecting...</span>
    </div>

    <nav class="feature-nav" role="tablist">
      <button class="feature-nav-btn active" data-feature="context" role="tab">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        Session Context
      </button>
      <button class="feature-nav-btn" data-feature="prompts" role="tab">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Prompts
      </button>
    </nav>

    <div class="header-right">
      <div id="chrome-indicator" class="chrome-indicator hidden" title="With Chrome mode active">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/>
          <line x1="21.17" y1="8" x2="12" y2="8"/><line x1="3.95" y1="6.06" x2="8.54" y2="14"/>
          <line x1="10.88" y1="21.94" x2="15.46" y2="14"/>
        </svg>
        Chrome
      </div>
      <button class="exit-session-btn" id="stopSessionBtn" disabled>Exit Session</button>
    </div>
  </header>

  <!-- YOLO Mode Banner -->
  <div id="yolo-banner" class="yolo-banner hidden"></div>

  <!-- Main layout: editor panels (top) + terminal (bottom) -->
  <div class="app-body">
    <main class="main-content">

      <!-- Context Panel -->
      <div class="panel context-panel active" id="contextPanel">
        <div class="panel-split">
          <div class="panel-pane editor-pane">
            <div class="pane-toolbar">
              <span class="pane-label">Editor</span>
              <div class="pane-toolbar-right">
                <span class="meta-text" id="contextCharCount">0 chars</span>
                <span class="meta-text meta-divider">|</span>
                <span class="meta-text" id="contextTokenCount">~0 tokens</span>
              </div>
            </div>
            <textarea
              class="code-textarea"
              id="contextEditor"
              spellcheck="false"
              disabled
              placeholder="Write your project context in Markdown..."></textarea>
            <div class="context-actions">
              <div class="template-picker" id="templatePicker">
                <button class="template-btn" id="templateBtn" disabled>Templates ▾</button>
                <div class="template-dropdown hidden" id="templateDropdown"></div>
              </div>
              <button class="send-btn" id="sendContextBtn" disabled>
                Send context
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="panel-gutter"></div>
          <div class="panel-pane ctx-history-pane">
            <div class="pane-toolbar pane-toolbar--history">
              <span class="pane-label">Sent History</span>
            </div>
            <div class="ctx-history-list" id="ctxHistoryList"></div>
          </div>
        </div>
      </div>

      <!-- Prompts Panel -->
      <div class="panel prompts-panel" id="promptsPanel">
        <div class="panel-split">
          <!-- History LEFT -->
          <div class="panel-pane history-pane">
            <div class="pane-toolbar">
              <span class="pane-label">History</span>
              <input type="text" class="search-input" id="historySearch" placeholder="Search...">
            </div>
            <div class="history-list" id="historyList"></div>
            <div class="history-footer" id="historyFooter">0 prompts</div>
          </div>
          <div class="panel-gutter"></div>
          <!-- Editor RIGHT -->
          <div class="panel-pane editor-pane prompt-editor-pane">
            <div class="pane-toolbar">
              <span class="pane-label">Compose</span>
              <div class="pane-toolbar-right">
                <span class="meta-text" id="promptCharCount">0 chars</span>
                <span class="meta-text meta-divider">|</span>
                <span class="meta-text" id="tokenEstimate">~0 tokens</span>
              </div>
            </div>
            <textarea
              class="code-textarea"
              id="promptEditor"
              spellcheck="false"
              disabled
              placeholder="Write your prompt here..."></textarea>
            <div class="prompt-actions">
              <button class="clear-btn" id="clearPromptBtn" disabled>Clear</button>
              <span class="context-hint" id="contextHint">Context not sent yet</span>
              <div class="attach-group" id="attachGroup">
                <button class="attach-btn" id="addFileBtn" disabled title="Attach file reference">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                  </svg>
                  Attach
                </button>
                <button class="attach-copy-btn hidden" id="attachCopyBtn" title="Copy last attached path">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                  </svg>
                </button>
              </div>
              <button class="send-btn" id="sendPromptBtn" disabled>
                Send prompt
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Terminal section (bottom) -->
    <div class="terminal-gutter" id="terminalGutter"></div>
    <section class="terminal-section">
      <div class="terminal-toolbar">
        <span class="pane-label">Terminal</span>
        <span class="meta-text" id="terminalStatus">connecting...</span>
      </div>
      <div id="terminal"></div>
    </section>
  </div>

  <!-- Status Bar -->
  <footer class="status-bar">
    <div class="status-left">
      <span class="status-item">
        <span id="statusProject">Wingman</span>
      </span>
    </div>
    <div class="status-right">
      <span class="status-item" id="statusMessage">Ready</span>
    </div>
  </footer>

  <div class="toast-container" id="toastContainer"></div>

  <!-- File Modal -->
  <div id="file-modal" class="modal-overlay hidden">
    <div class="modal-box file-modal-box">
      <div class="modal-header">
        <span class="modal-title">Add File Reference</span>
        <button class="modal-close" id="file-close">✕</button>
      </div>

      <!-- Drop zone for uploading files -->
      <div class="file-dropzone" id="fileDropzone">
        <input type="file" id="filePickerInput" class="file-picker-input" />
        <div class="dropzone-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <div class="dropzone-text">Drop file here or <span class="dropzone-link">browse</span></div>
        <div class="dropzone-hint">File will be saved to project</div>
      </div>

      <!-- Upload result -->
      <div class="file-upload-result hidden" id="fileUploadResult">
        <span class="file-upload-path" id="fileUploadPath"></span>
        <button class="save-btn" id="fileUploadCopyBtn">Copy Path</button>
      </div>

      <!-- Browse existing project files -->
      <div class="file-browser-toggle">
        <button class="file-browser-toggle-btn" id="fileBrowserToggle">Browse project files</button>
      </div>
      <div class="file-browser-section hidden" id="fileBrowserSection">
        <div class="file-browser-path" id="fileBrowserPath">.</div>
        <div class="modal-body file-browser-body" id="fileBrowserList"></div>
        <div class="modal-footer file-browser-footer">
          <span class="file-selected-path" id="fileSelectedPath">Select a file</span>
          <button class="save-btn" id="fileCopyBtn" disabled>Copy Path</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Session Loading Overlay -->
  <div id="session-loading-overlay" class="overlay">
    <div class="overlay-loading">
      <div class="loading-spinner"></div>
      <div class="overlay-content" style="color: var(--text-2); font-size: 16px;">Starting session...</div>
    </div>
  </div>

  <!-- Session Ended Overlay -->
  <div id="session-ended-overlay" class="overlay hidden">
    <div class="overlay-content">Session Ended</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.11.0/lib/addon-fit.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.js"></script>
  <script src="/terminal.js"></script>
  <script src="/session-ui.js"></script>
</body>
</html>
