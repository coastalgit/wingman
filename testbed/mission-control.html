<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wingman - Mission Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="mission-control.css" />
</head>
<body>

  <!-- ─── Header ──────────────────────────────────────────── -->
  <header class="app-header">
    <div class="header-brand">
      <div class="brand-mark">W</div>
      <span class="brand-name">Wingman</span>
    </div>

    <span class="header-title">Mission Control</span>

    <div class="header-right">
      <button id="settings-btn" class="settings-btn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <button id="exit-btn" class="exit-btn">Exit Wingman</button>
    </div>
  </header>

  <!-- ─── Settings Modal ─────────────────────────────── -->
  <div id="settings-modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">Settings</span>
        <button class="modal-close" id="settings-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="setting-row">
          <label class="setting-label" for="defaultFileDirInput">Default file destination</label>
          <div class="setting-hint">Directory where files are saved from the composer</div>
          <input type="text" id="defaultFileDirInput" class="setting-input" placeholder="docs/promptfiles/" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" id="settings-cancel">Cancel</button>
        <button class="save-btn" id="settings-save">Save</button>
      </div>
    </div>
  </div>

  <!-- ─── Args Editor Modal ─────────────────────────── -->
  <div id="args-modal" class="modal-overlay hidden">
    <div class="modal-box args-modal-box">
      <div class="modal-header">
        <span class="modal-title" id="argsModalTitle">Session Arguments</span>
        <button class="modal-close" id="args-close">✕</button>
      </div>
      <div class="modal-body args-modal-body" id="argsFlagsList"></div>
      <div class="modal-footer">
        <span class="args-status" id="argsStatus"></span>
        <button class="btn" id="args-cancel">Cancel</button>
        <button class="save-btn" id="args-save">Save</button>
      </div>
    </div>
  </div>

  <!-- ─── Mode Banner (manual mode indicator) ─────────── -->
  <div id="mode-banner" class="mode-banner" style="display:none;"></div>


  <!-- ─── Main ──────────────────────────────────────────── -->
  <main class="mc-main">
    <div id="sessions-list" class="sessions-list"></div>
  </main>

  <!-- ─── Status Bar ──────────────────────────────────────── -->
  <footer class="status-bar">
    <div class="status-left">
      <span class="status-item">
        <span id="statusProject">Mission Control</span>
      </span>
    </div>
    <div class="status-right">
      <span class="status-item">
        <span class="status-dot"></span>
        <span id="statusSessions">0 sessions</span>
      </span>
    </div>
  </footer>

  <!-- ─── Shutdown Overlay ──────────────────────────────── -->
  <div id="shutdown-overlay" class="overlay hidden">
    <div class="overlay-content">Wingman shutting down...</div>
  </div>

  <!-- Floating Action Button -->
  <button id="new-session-btn" class="fab" title="New Session">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <script src="mission-control.js"></script>
</body>
</html>
