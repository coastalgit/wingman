<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wingman</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Merriweather:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

  <!-- ─── Header ──────────────────────────────────────────── -->
  <header class="app-header">
    <div class="header-brand">
      <div class="brand-mark">W</div>
      <span class="brand-name">Wingman</span>
    </div>

    <nav class="feature-nav" role="tablist">
      <button class="feature-nav-btn active" data-feature="context" role="tab">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
        Session Context
      </button>
      <button class="feature-nav-btn" data-feature="prompts" role="tab">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        Prompts
      </button>
    </nav>

    <div class="header-session" id="headerSessionInfo">
      <span class="header-session-dot" id="headerSessionDot"></span>
      <span id="headerSessionName">Auth refactor</span>
    </div>

    <div class="header-menu-wrap">
      <button class="header-icon-btn" id="menuBtn" title="Menu">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="header-menu" id="headerMenu">
        <button class="header-menu-item" id="menuSettings">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Settings
        </button>
        <button class="header-menu-item" id="menuHelp">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Help
        </button>
      </div>
    </div>
  </header>

  <!-- ─── Main Layout ─────────────────────────────────────── -->
  <div class="app-body">

    <!-- Sidebar: Sessions -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Sessions</span>
        <button class="sidebar-add-btn" id="newSessionBtn" title="New session">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
      <div class="sidebar-project">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        <span class="sidebar-project-path" id="sidebarProject">~/projects/saas-app</span>
      </div>
      <div class="session-list" id="sessionList"></div>
      <div class="sidebar-footer">
        <span class="stat-label">Total prompts</span>
        <span class="stat-value" id="totalPrompts">--</span>
      </div>
    </aside>

    <!-- Main content area -->
    <main class="main-content">

      <!-- ─── Context Panel ─────────────────────────── -->
      <div class="panel context-panel active" id="contextPanel">
        <div class="panel-split">
          <div class="panel-pane editor-pane">
            <div class="pane-toolbar">
              <span class="pane-label">Editor</span>
              <div class="pane-toolbar-right">
                <button class="toolbar-btn" id="insertTemplateBtn">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                  Template
                </button>
                <span class="meta-text" id="contextCharCount">0 chars</span>
                <span class="meta-text meta-divider">|</span>
                <span class="meta-text" id="contextTokenCount">~0 tokens</span>
              </div>
            </div>
            <textarea
              class="code-textarea"
              id="contextEditor"
              spellcheck="false"
              placeholder="Write your project context in Markdown..."></textarea>
            <div class="context-actions" id="contextActions">
              <div></div>
              <button class="save-btn" id="saveContextBtn">
                Save context
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="panel-gutter"></div>
          <div class="panel-pane preview-pane">
            <div class="pane-toolbar pane-toolbar--preview">
              <span class="pane-label">Preview</span>
              <span class="preview-tag">markdown</span>
            </div>
            <div class="preview-surface">
              <div class="markdown-preview" id="contextPreview">
                <p class="preview-empty">Start typing to see a live preview...</p>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ─── Prompts Panel ─────────────────────────── -->
      <div class="panel prompts-panel" id="promptsPanel">
        <div class="panel-split">
          <!-- History LEFT -->
          <div class="panel-pane history-pane">
            <div class="pane-toolbar">
              <span class="pane-label">History</span>
              <input type="text" class="search-input" id="historySearch" placeholder="Search...">
            </div>
            <div class="history-list" id="historyList"></div>
          </div>
          <div class="panel-gutter"></div>
          <!-- Editor RIGHT -->
          <div class="panel-pane editor-pane prompt-editor-pane">
            <div class="pane-toolbar">
              <span class="pane-label">Compose</span>
              <div class="pane-toolbar-right">
                <span class="meta-text" id="promptCharCount">0 chars</span>
                <span class="meta-text meta-divider">|</span>
                <span class="meta-text" id="tokenEstimate">~0 tokens</span>
              </div>
            </div>
            <textarea
              class="code-textarea"
              id="promptEditor"
              spellcheck="false"
              placeholder="Write your prompt here..."></textarea>
            <div class="prompt-actions">
              <button class="clear-btn" id="clearPromptBtn">
                Clear
              </button>
              <button class="save-btn" id="sendPromptBtn">
                Save prompt
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- ─── Status Bar ──────────────────────────────────────── -->
  <footer class="status-bar">
    <div class="status-left">
      <span class="status-item">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        <span id="statusProject">~/projects/saas-app</span>
      </span>
    </div>
    <div class="status-right">
      <span class="status-item" id="statusMessage">Ready</span>
    </div>
  </footer>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/app.js"></script>
</body>
</html>
